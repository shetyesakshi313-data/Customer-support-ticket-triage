[project]
name = "support-ticket-triage"
version = "1.0.0"
description = "OpenEnv customer support triage environment"
authors = [{ name = "Sakshi Shetye" }]
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.29.0",
    "pydantic>=2.0.0",
    "openai>=1.30.0",
    "openenv-core>=0.2.0"
]

[project.scripts]
server = "server.app:main"

[tool.openenv]
entrypoint = "server.app:main"
